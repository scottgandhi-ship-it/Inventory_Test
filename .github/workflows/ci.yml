name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for console.log
        run: bash .scripts/check-console-logs.sh

      - name: Validate HTML syntax
        run: bash .scripts/check-html-syntax.sh
