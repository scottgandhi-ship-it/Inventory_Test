<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2196F3">
  <meta name="description" content="Trucker Washing parts inventory management">
  <title>TW Inventory</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- App Header -->
  <header class="app-header" role="banner">
    <h1 class="app-title">TW Inventory <span class="app-version">v0.5</span></h1>
  </header>

  <!-- Main Content -->
  <main id="mainContent" role="main" tabindex="-1">
    <section class="inventory-view" aria-label="Inventory items">
      <p class="empty-state">Loading...</p>
    </section>
  </main>

  <!-- Toast Notifications -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="bottom-nav-btn" data-view="dashboard" aria-label="Dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/>
        <rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      <span>Dashboard</span>
    </button>
    <button class="bottom-nav-btn bottom-nav-btn--scan" data-view="scan" aria-label="Scan QR code">
      <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M3 7V5a2 2 0 012-2h2"/>
        <path d="M17 3h2a2 2 0 012 2v2"/>
        <path d="M21 17v2a2 2 0 01-2 2h-2"/>
        <path d="M7 21H5a2 2 0 01-2-2v-2"/>
        <line x1="7" y1="12" x2="17" y2="12"/>
      </svg>
      <span>Scan</span>
    </button>
    <button class="bottom-nav-btn" data-view="manage" aria-label="Manage parts">
      <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      <span>Manage</span>
    </button>
  </nav>

  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <!-- App Scripts -->
  <script src="js/state.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/parts.js"></script>
  <script src="js/import.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

</body>
</html>
